<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAtlas | Auto-Fix Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Header */
      header {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid #30363d;
      }

      h1 {
        font-size: 32px;
        color: #58a6ff;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .subtitle {
        font-size: 14px;
        color: #8b949e;
        margin-bottom: 15px;
      }

      .back-btn {
        display: inline-block;
        padding: 8px 16px;
        background: #21262d;
        color: #58a6ff;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        border: 1px solid #30363d;
        transition: all 0.2s;
      }

      .back-btn:hover {
        background: #30363d;
        border-color: #58a6ff;
      }

      /* Summary Bar */
      .summary-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px 24px;
        margin-bottom: 30px;
      }

      .summary-pill {
        font-size: 16px;
        color: #c9d1d9;
        font-weight: 500;
      }

      .summary-pill span {
        color: #8b949e;
        margin: 0 8px;
      }

      .apply-btn {
        padding: 10px 20px;
        background: #238636;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.2s;
      }

      .apply-btn:hover:not(:disabled) {
        background: #2ea043;
      }

      .apply-btn:disabled {
        background: #30363d;
        color: #8b949e;
        cursor: not-allowed;
        opacity: 0.5;
      }

      /* Fix Cards */
      .fix-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 24px;
        margin-bottom: 20px;
        transition: all 0.2s;
      }

      .fix-card.approved {
        border-left: 4px solid #238636;
        opacity: 0.7;
      }

      .fix-card.rejected {
        border-left: 4px solid #da3633;
        opacity: 0.4;
      }

      .fix-card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .file-badge {
        padding: 6px 12px;
        background: #21262d;
        border-radius: 6px;
        font-family: monospace;
        font-size: 13px;
        color: #58a6ff;
      }

      .issue-type-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .issue-type-badge.dead_code {
        background: rgba(248, 81, 73, 0.15);
        color: #f85149;
      }

      .issue-type-badge.missing_test {
        background: rgba(227, 179, 65, 0.15);
        color: #e3b341;
      }

      .issue-type-badge.doc_gap {
        background: rgba(88, 166, 255, 0.15);
        color: #58a6ff;
      }

      .severity-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .severity-badge.high {
        background: rgba(255, 123, 114, 0.15);
        color: #ff7b72;
      }

      .severity-badge.medium {
        background: rgba(210, 153, 34, 0.15);
        color: #d29922;
      }

      .severity-badge.low {
        background: rgba(139, 148, 158, 0.15);
        color: #8b949e;
      }

      .line-number {
        font-size: 12px;
        color: #8b949e;
        font-family: monospace;
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-left: auto;
      }

      .status-badge.approved {
        background: rgba(35, 134, 54, 0.15);
        color: #238636;
      }

      .status-badge.rejected {
        background: rgba(218, 54, 51, 0.15);
        color: #da3633;
      }

      .bob-explanation {
        font-style: italic;
        color: #8b949e;
        font-size: 14px;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .diff-container {
        margin: 16px 0;
        border: 1px solid #30363d;
        border-radius: 6px;
        overflow: hidden;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }

      .action-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.2s;
      }

      .action-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .approve-btn {
        background: #238636;
        color: white;
      }

      .approve-btn:hover:not(:disabled) {
        background: #2ea043;
      }

      .reject-btn {
        background: #da3633;
        color: white;
      }

      .reject-btn:hover:not(:disabled) {
        background: #e5534b;
      }

      .modify-btn {
        background: #8957e5;
        color: white;
      }

      .modify-btn:hover:not(:disabled) {
        background: #9d6ff5;
      }

      .modify-section {
        display: none;
        margin-top: 16px;
        padding: 16px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
      }

      .modify-section.visible {
        display: block;
      }

      .modify-textarea {
        width: 100%;
        min-height: 80px;
        padding: 12px;
        background: #161b22;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        font-size: 14px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        resize: vertical;
        margin-bottom: 12px;
      }

      .modify-textarea:focus {
        outline: none;
        border-color: #58a6ff;
      }

      .regenerate-btn {
        padding: 10px 20px;
        background: #8957e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.2s;
      }

      .regenerate-btn:hover {
        background: #9d6ff5;
      }

      /* Loading State */
      .loading {
        text-align: center;
        padding: 60px 20px;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto 20px;
        border: 4px solid #30363d;
        border-top: 4px solid #58a6ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 16px;
        color: #8b949e;
      }

      /* Error State */
      .error {
        background: rgba(255, 123, 114, 0.1);
        border: 1px solid #ff7b72;
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
        color: #ff7b72;
      }

      .error-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 8px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #0d1117;
      }

      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 5px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }

      /* Responsive */
      @media (max-width: 768px) {
        h1 {
          font-size: 24px;
        }

        .summary-bar {
          flex-direction: column;
          gap: 16px;
          align-items: stretch;
        }

        .action-buttons {
          flex-direction: column;
        }
      }

      :root {
        --rr-bg: #0d1117;
        --rr-card: rgba(22, 27, 34, 0.9);
        --rr-border: #30363d;
        --rr-text: #f0f6fc;
        --rr-muted: #8b949e;
        --rr-blue: #58a6ff;
        --rr-green: #3fb950;
        --rr-red: #ff7b72;
        --rr-amber: #e3b341;
        --rr-purple: #a371f7;
      }

      body {
        padding: 0 24px 48px;
        background:
          radial-gradient(circle at 6% 0%, rgba(163, 113, 247, 0.14), transparent 28%),
          radial-gradient(circle at 90% 12%, rgba(88, 166, 255, 0.14), transparent 30%),
          linear-gradient(rgba(88, 166, 255, 0.026) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88, 166, 255, 0.026) 1px, transparent 1px),
          var(--rr-bg);
        background-size: auto, auto, 56px 56px, 56px 56px, auto;
        color: var(--rr-text);
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        animation: pageIn 0.42s ease both;
      }

      @keyframes pageIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .app-nav {
        position: sticky;
        top: 0;
        z-index: 50;
        margin: 0 -24px 34px;
        border-bottom: 1px solid rgba(48, 54, 61, 0.82);
        background: rgba(13, 17, 23, 0.78);
        backdrop-filter: blur(22px);
      }

      .nav-inner {
        min-height: 72px;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--rr-text);
        text-decoration: none;
        font-family: "Space Grotesk", "Inter", sans-serif;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        display: inline-grid;
        place-items: center;
        border-radius: 12px;
        border: 1px solid rgba(88, 166, 255, 0.36);
        background: linear-gradient(135deg, rgba(88, 166, 255, 0.2), rgba(63, 185, 80, 0.1));
        color: var(--rr-blue);
        box-shadow: 0 0 26px rgba(88, 166, 255, 0.16);
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--rr-muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .step {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border: 1px solid rgba(48, 54, 61, 0.86);
        border-radius: 999px;
        background: rgba(22, 27, 34, 0.64);
        white-space: nowrap;
      }

      .step.active {
        color: var(--rr-purple);
        border-color: rgba(163, 113, 247, 0.55);
        box-shadow: 0 0 26px rgba(163, 113, 247, 0.14);
      }

      .auth-stepper {
        display: none;
      }

      body.is-authenticated .auth-stepper {
        display: flex;
      }

      .container {
        max-width: 1400px;
      }

      header {
        margin-bottom: 28px;
        padding: 0;
        border: 0;
      }

      h1 {
        color: var(--rr-text);
        font-family: "Space Grotesk", "Inter", sans-serif;
        font-size: clamp(36px, 5vw, 64px);
        line-height: 0.98;
        letter-spacing: 0;
        margin-bottom: 14px;
      }

      .subtitle {
        max-width: 680px;
        color: #a6b1bf;
        font-size: 16px;
        line-height: 1.65;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(48, 54, 61, 0.9);
        background: rgba(22, 27, 34, 0.72);
        color: var(--rr-blue);
        font-weight: 800;
        text-decoration: none;
        box-shadow: none;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(88, 166, 255, 0.62);
        background: rgba(88, 166, 255, 0.1);
        box-shadow: 0 0 26px rgba(88, 166, 255, 0.15);
      }

      .back-btn:active,
      .apply-btn:active,
      .action-btn:active,
      .regenerate-btn:active {
        transform: scale(0.98);
      }

      .summary-bar {
        border-radius: 18px;
        border: 1px solid rgba(48, 54, 61, 0.9);
        background:
          linear-gradient(145deg, rgba(22, 27, 34, 0.94), rgba(13, 17, 23, 0.88)),
          radial-gradient(circle at 100% 0%, rgba(63, 185, 80, 0.12), transparent 34%);
        padding: 22px 24px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        font-weight: 900;
      }

      .summary-pill span[id] {
        display: inline-grid;
        min-width: 36px;
        height: 30px;
        place-items: center;
        margin: 0;
        border-radius: 999px;
        background: rgba(88, 166, 255, 0.12);
        color: var(--rr-blue);
      }

      .apply-btn {
        min-height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #238636, #2ea043);
        border: 1px solid rgba(63, 185, 80, 0.52);
        box-shadow: 0 14px 38px rgba(35, 134, 54, 0.26);
        font-weight: 900;
      }

      .apply-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow:
          0 18px 46px rgba(35, 134, 54, 0.36),
          0 0 0 5px rgba(35, 134, 54, 0.1);
      }

      .apply-btn:disabled {
        background: rgba(48, 54, 61, 0.62);
        border: 1px solid rgba(48, 54, 61, 0.9);
      }

      .fix-card {
        position: relative;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(48, 54, 61, 0.9);
        background:
          linear-gradient(145deg, rgba(22, 27, 34, 0.94), rgba(13, 17, 23, 0.88)),
          radial-gradient(circle at 100% 0%, rgba(88, 166, 255, 0.1), transparent 36%);
        padding: 28px;
        margin-bottom: 22px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
      }

      .fix-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 3px;
        background: var(--rr-blue);
        opacity: 0.85;
      }

      .fix-card:has(.issue-type-badge.dead_code)::before {
        background: var(--rr-red);
      }

      .fix-card:has(.issue-type-badge.missing_test)::before {
        background: var(--rr-amber);
      }

      .fix-card:has(.issue-type-badge.doc_gap)::before {
        background: var(--rr-blue);
      }

      .fix-card:hover {
        transform: translateY(-4px);
        border-color: rgba(88, 166, 255, 0.5);
        box-shadow:
          0 24px 72px rgba(0, 0, 0, 0.34),
          0 0 42px rgba(88, 166, 255, 0.1);
      }

      .fix-card.approved {
        border-left: 4px solid var(--rr-green);
        opacity: 0.88;
      }

      .fix-card.rejected {
        border-left: 4px solid var(--rr-red);
        opacity: 0.58;
      }

      .fix-card-header {
        gap: 10px;
        margin-bottom: 16px;
      }

      .file-badge,
      .line-number {
        font-family: "JetBrains Mono", monospace;
      }

      .file-badge {
        border-radius: 999px;
        border: 1px solid rgba(88, 166, 255, 0.24);
        background: rgba(88, 166, 255, 0.1);
      }

      .issue-type-badge,
      .severity-badge,
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        font-weight: 900;
      }

      .issue-type-badge::before {
        width: 17px;
        height: 17px;
        display: inline-grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        font-size: 10px;
        line-height: 1;
      }

      .issue-type-badge.dead_code::before {
        content: "x";
      }

      .issue-type-badge.missing_test::before {
        content: "T";
      }

      .issue-type-badge.doc_gap::before {
        content: "D";
      }

      .severity-badge::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }

      .severity-badge.high::before {
        animation: pulseDot 1.4s ease-in-out infinite;
      }

      @keyframes pulseDot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.45;
          transform: scale(1.45);
        }
      }

      .status-badge {
        animation: statusPop 0.32s ease both;
      }

      @keyframes statusPop {
        from {
          opacity: 0;
          transform: scale(0.86);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .bob-explanation {
        border-left: 3px solid rgba(163, 113, 247, 0.45);
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(163, 113, 247, 0.08);
        color: #c9d1d9;
        font-style: normal;
      }

      .diff-container {
        margin: 18px 0;
        border-radius: 16px;
        border: 1px solid rgba(48, 54, 61, 0.92);
        background: #010409;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .action-buttons {
        gap: 12px;
        margin-top: 18px;
      }

      .action-btn,
      .regenerate-btn {
        min-height: 42px;
        border-radius: 12px;
        border: 1px solid transparent;
        font-weight: 900;
      }

      .approve-btn {
        background: linear-gradient(135deg, #238636, #2ea043);
        border-color: rgba(63, 185, 80, 0.52);
        box-shadow: 0 12px 34px rgba(35, 134, 54, 0.2);
      }

      .approve-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow:
          0 16px 42px rgba(35, 134, 54, 0.34),
          0 0 0 5px rgba(35, 134, 54, 0.1);
      }

      .reject-btn {
        background: linear-gradient(135deg, #da3633, #ff7b72);
        border-color: rgba(255, 123, 114, 0.5);
        box-shadow: 0 12px 34px rgba(218, 54, 51, 0.18);
      }

      .reject-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow:
          0 16px 42px rgba(218, 54, 51, 0.3),
          0 0 0 5px rgba(218, 54, 51, 0.1);
      }

      .modify-btn,
      .regenerate-btn {
        background: linear-gradient(135deg, #8957e5, #a371f7);
        border-color: rgba(163, 113, 247, 0.5);
        box-shadow: 0 12px 34px rgba(137, 87, 229, 0.2);
      }

      .modify-btn:hover:not(:disabled),
      .regenerate-btn:hover {
        transform: translateY(-1px);
        box-shadow:
          0 16px 42px rgba(137, 87, 229, 0.34),
          0 0 0 5px rgba(137, 87, 229, 0.1);
      }

      .modify-section {
        border-radius: 16px;
        border-color: rgba(163, 113, 247, 0.26);
        background: rgba(1, 4, 9, 0.44);
        animation: sectionIn 0.22s ease both;
      }

      @keyframes sectionIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modify-textarea {
        border-radius: 12px;
        border-color: rgba(48, 54, 61, 0.9);
        background: rgba(13, 17, 23, 0.9);
        font-family: "Inter", system-ui, sans-serif;
      }

      .modify-textarea:focus {
        border-color: rgba(163, 113, 247, 0.72);
        box-shadow: 0 0 0 3px rgba(163, 113, 247, 0.12);
      }

      .loading {
        position: relative;
        overflow: hidden;
        max-width: 700px;
        margin: 40px auto;
        border: 1px solid rgba(88, 166, 255, 0.24);
        border-radius: 24px;
        background: rgba(13, 17, 23, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .loading::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(88, 166, 255, 0.13), transparent);
        transform: translateX(-100%);
        animation: scannerSweep 1.9s ease-in-out infinite;
      }

      @keyframes scannerSweep {
        to {
          transform: translateX(100%);
        }
      }

      .loading-spinner {
        position: relative;
        border-color: rgba(88, 166, 255, 0.14);
        border-top-color: var(--rr-blue);
        box-shadow: 0 0 34px rgba(88, 166, 255, 0.28);
      }

      .loading-text {
        position: relative;
      }

      .error {
        border-radius: 18px;
        background: rgba(255, 123, 114, 0.1);
        border-color: rgba(255, 123, 114, 0.36);
      }

      @media (max-width: 1150px) {
        .stepper,
        body.is-authenticated .auth-stepper {
          display: none;
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 0 14px 36px;
        }

        .app-nav {
          margin-inline: -14px;
        }

        .nav-inner,
        .nav-right {
          align-items: flex-start;
          flex-direction: column;
          height: auto;
          padding-block: 14px;
        }

        .summary-bar {
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <nav class="app-nav" aria-label="Primary">
      <div class="nav-inner">
        <a class="brand" href="landing.html" aria-label="CodeAtlas home">
          <span class="brand-mark"><i data-lucide="git-pull-request"></i></span>
          <span>CodeAtlas</span>
        </a>
        <div class="nav-right">
          <div class="stepper auth-stepper" aria-label="Workflow steps">
            <span class="step">Step 1: Analyse</span>
            <span class="step">Step 2: Scan</span>
            <span class="step active">Step 3: Fix</span>
            <span class="step">Step 4: Apply</span>
          </div>
          <a href="health.html" class="back-btn">← Health Scan</a>
        </div>
      </div>
    </nav>
    <div class="container">
      <header>
        <h1>Auto-Fix Queue</h1>
        <p class="subtitle">
          AI-generated fixes · human-approved changes
        </p>
      </header>

      <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading auto-fix queue...</div>
      </div>

      <div id="content" style="display: none">
        <!-- Summary Bar -->
        <div class="summary-bar">
          <div class="summary-pill" id="summaryPill">
            <span id="pendingCount">0</span> pending<span>·</span
            ><span id="approvedCount">0</span> approved<span>·</span
            ><span id="rejectedCount">0</span> rejected
          </div>
          <button id="applyBtn" class="apply-btn" disabled>
            Apply Approved Fixes →
          </button>
        </div>

        <!-- Fix Cards Container -->
        <div id="fixCards"></div>
      </div>

      <div id="error" style="display: none"></div>
    </div>

    <script>
      if (localStorage.getItem("codeAtlasAuthenticated") === "true") {
        document.body.classList.add("is-authenticated");
      }

      let fixesData = [];

      // Fetch fixes on page load
      async function loadFixes() {
        const loadingEl = document.getElementById("loading");
        const contentEl = document.getElementById("content");
        const errorEl = document.getElementById("error");

        try {
          // Get repoPath from localStorage
          const repoPath = localStorage.getItem("repoPath");
          if (!repoPath) {
            throw new Error("No repository path found. Please analyze a repository first.");
          }

          const response = await fetch(`/api/fixes?repoPath=${encodeURIComponent(repoPath)}`);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();
          fixesData = data.fixes;

          renderFixes();
          updateSummary();

          loadingEl.style.display = "none";
          contentEl.style.display = "block";
        } catch (error) {
          console.error("Failed to load fixes:", error);

          errorEl.innerHTML = `
            <div class="error">
              <div class="error-title">❌ Failed to Load Fixes</div>
              <div>${error.message}</div>
            </div>
          `;

          loadingEl.style.display = "none";
          errorEl.style.display = "block";
        }
      }

      function renderFixes() {
        const container = document.getElementById("fixCards");
        container.innerHTML = "";

        fixesData.forEach((fix) => {
          const card = createFixCard(fix);
          container.appendChild(card);
        });
      }

      function createFixCard(fix) {
        const card = document.createElement("div");
        card.className = `fix-card ${fix.status === "approved" ? "approved" : ""} ${fix.status === "rejected" ? "rejected" : ""}`;
        card.id = `fix-${fix.id}`;

        // Create header
        const header = document.createElement("div");
        header.className = "fix-card-header";

        const fileBadge = document.createElement("span");
        fileBadge.className = "file-badge";
        fileBadge.textContent = fix.file;

        const issueTypeBadge = document.createElement("span");
        issueTypeBadge.className = `issue-type-badge ${fix.issueType}`;
        issueTypeBadge.textContent = fix.issueType.replace(/_/g, " ");

        const severityBadge = document.createElement("span");
        severityBadge.className = `severity-badge ${fix.severity}`;
        severityBadge.textContent = fix.severity;

        const lineNumber = document.createElement("span");
        lineNumber.className = "line-number";
        lineNumber.textContent = `Line ${fix.line}`;

        header.appendChild(fileBadge);
        header.appendChild(issueTypeBadge);
        header.appendChild(severityBadge);
        header.appendChild(lineNumber);

        // Add status badge if approved or rejected
        if (fix.status === "approved" || fix.status === "rejected") {
          const statusBadge = document.createElement("span");
          statusBadge.className = `status-badge ${fix.status}`;
          statusBadge.textContent = fix.status === "approved" ? "✓ APPROVED" : "✗ REJECTED";
          header.appendChild(statusBadge);
        }

        // Bob's explanation
        const explanation = document.createElement("div");
        explanation.className = "bob-explanation";
        explanation.textContent = fix.bobExplanation;

        // Diff container
        const diffContainer = document.createElement("div");
        diffContainer.className = "diff-container";
        diffContainer.id = `diff-${fix.id}`;

        // Action buttons
        const actionButtons = document.createElement("div");
        actionButtons.className = "action-buttons";

        const approveBtn = document.createElement("button");
        approveBtn.className = "action-btn approve-btn";
        approveBtn.textContent = "✓ Approve";
        approveBtn.disabled = fix.status !== "pending";
        approveBtn.onclick = () => handleDecision(fix.id, "approved");

        const rejectBtn = document.createElement("button");
        rejectBtn.className = "action-btn reject-btn";
        rejectBtn.textContent = "✗ Reject";
        rejectBtn.disabled = fix.status !== "pending";
        rejectBtn.onclick = () => handleDecision(fix.id, "rejected");

        const modifyBtn = document.createElement("button");
        modifyBtn.className = "action-btn modify-btn";
        modifyBtn.textContent = "✎ Modify";
        modifyBtn.disabled = fix.status !== "pending";
        modifyBtn.onclick = () => toggleModifySection(fix.id);

        actionButtons.appendChild(approveBtn);
        actionButtons.appendChild(rejectBtn);
        actionButtons.appendChild(modifyBtn);

        // Modify section
        const modifySection = document.createElement("div");
        modifySection.className = "modify-section";
        modifySection.id = `modify-${fix.id}`;

        const textarea = document.createElement("textarea");
        textarea.className = "modify-textarea";
        textarea.placeholder = "Describe the change — e.g. 'cover the null input edge case'";
        textarea.id = `feedback-${fix.id}`;

        const regenerateBtn = document.createElement("button");
        regenerateBtn.className = "regenerate-btn";
        regenerateBtn.textContent = "Regenerate →";
        regenerateBtn.onclick = () => handleRegenerate(fix.id);

        modifySection.appendChild(textarea);
        modifySection.appendChild(regenerateBtn);

        // Assemble card
        card.appendChild(header);
        card.appendChild(explanation);
        card.appendChild(diffContainer);
        card.appendChild(actionButtons);
        card.appendChild(modifySection);

        // Render diff after card is added to DOM
        setTimeout(() => renderDiff(fix), 0);

        return card;
      }

      function renderDiff(fix) {
        const diffString = createUnifiedDiff(fix);
        const targetElement = document.getElementById(`diff-${fix.id}`);

        if (targetElement) {
          const diff2htmlUi = new Diff2HtmlUI(targetElement, diffString, {
            drawFileList: false,
            matching: "lines",
            outputFormat: "side-by-side",
            synchronisedScroll: true,
          });
          diff2htmlUi.draw();
        }
      }

      function createUnifiedDiff(fix) {
        // Strip the metadata header that extractCodeSnippet() prepends
        // e.g. "// path/to/file  (lines 5–16)" — it's not real source code
        function stripSnippetHeader(text) {
          const lines = text.split("\n");
          // Matches both header formats produced by extractCodeSnippet():
          //   "// path/to/file  (lines N–M)"   ← specific line window
          //   "// (No specific line — ..."      ← first-20-lines fallback
          if (
            lines.length > 0 &&
            (lines[0].match(/^\/\/ .+\(lines \d+/) ||
              lines[0].startsWith("// (No specific line"))
          ) {
            lines.shift();
          }
          return lines.join("\n");
        }

        const cleanOriginal = stripSnippetHeader(fix.original);
        const cleanProposed = fix.proposed; // proposed never has this header

        const originalLines = cleanOriginal.split("\n");
        const proposedLines = cleanProposed.split("\n");

        // Unified diff header
        const diffHeader = `--- ${fix.file}\n+++ ${fix.file}\n@@ -1,${originalLines.length} +1,${proposedLines.length} @@\n`;

        let diff = diffHeader;

        // Mark all original lines as removed, all proposed as added.
        // This gives a clear "before → after" view for every fix type.
        originalLines.forEach((line) => {
          diff += `-${line}\n`;
        });

        proposedLines.forEach((line) => {
          diff += `+${line}\n`;
        });

        return diff;
      }

      async function handleDecision(fixId, decision) {
        try {
          const response = await fetch(`/api/fixes/${fixId}/decision`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ decision }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const updatedFix = await response.json();

          // Update local data
          const index = fixesData.findIndex((f) => f.id === fixId);
          if (index !== -1) {
            fixesData[index] = updatedFix;
          }

          // Update UI
          updateFixCard(updatedFix);
          updateSummary();
        } catch (error) {
          console.error("Decision failed:", error);
          alert(`Failed to ${decision} fix: ${error.message}`);
        }
      }

      function updateFixCard(fix) {
        const card = document.getElementById(`fix-${fix.id}`);
        if (!card) return;

        // Update card classes
        card.className = `fix-card ${fix.status === "approved" ? "approved" : ""} ${fix.status === "rejected" ? "rejected" : ""}`;

        // Disable buttons
        const buttons = card.querySelectorAll(".action-btn");
        buttons.forEach((btn) => (btn.disabled = true));

        // Add status badge if not already present
        const header = card.querySelector(".fix-card-header");
        let statusBadge = header.querySelector(".status-badge");
        
        if (!statusBadge && (fix.status === "approved" || fix.status === "rejected")) {
          statusBadge = document.createElement("span");
          statusBadge.className = `status-badge ${fix.status}`;
          statusBadge.textContent = fix.status === "approved" ? "✓ APPROVED" : "✗ REJECTED";
          header.appendChild(statusBadge);
        }

        // Update explanation if it changed
        const explanation = card.querySelector(".bob-explanation");
        if (explanation) {
          explanation.textContent = fix.bobExplanation;
        }
      }

      function toggleModifySection(fixId) {
        const section = document.getElementById(`modify-${fixId}`);
        if (section) {
          section.classList.toggle("visible");
        }
      }

      async function handleRegenerate(fixId) {
        const textarea = document.getElementById(`feedback-${fixId}`);
        const feedback = textarea.value.trim();

        if (!feedback) {
          alert("Please provide feedback for the modification.");
          return;
        }

        try {
          const response = await fetch(`/api/fixes/${fixId}/decision`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ decision: "modified", feedback }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const updatedFix = await response.json();

          // Update local data
          const index = fixesData.findIndex((f) => f.id === fixId);
          if (index !== -1) {
            fixesData[index] = updatedFix;
          }

          // Update explanation in UI
          const card = document.getElementById(`fix-${fixId}`);
          const explanation = card.querySelector(".bob-explanation");
          if (explanation) {
            explanation.textContent = updatedFix.bobExplanation;
          }

          // Hide modify section
          const section = document.getElementById(`modify-${fixId}`);
          if (section) {
            section.classList.remove("visible");
          }

          // Clear textarea
          textarea.value = "";

          alert("✅ Fix regenerated with your feedback!");
        } catch (error) {
          console.error("Regeneration failed:", error);
          alert(`Failed to regenerate fix: ${error.message}`);
        }
      }

      function updateSummary() {
        const pending = fixesData.filter((f) => f.status === "pending").length;
        const approved = fixesData.filter((f) => f.status === "approved").length;
        const rejected = fixesData.filter((f) => f.status === "rejected").length;

        document.getElementById("pendingCount").textContent = pending;
        document.getElementById("approvedCount").textContent = approved;
        document.getElementById("rejectedCount").textContent = rejected;

        // Enable apply button if at least one fix is approved
        const applyBtn = document.getElementById("applyBtn");
        applyBtn.disabled = approved === 0;
      }

      // Apply approved fixes button handler
      document.getElementById("applyBtn").addEventListener("click", () => {
        window.location.href = 'apply.html';
      });

      // Load fixes when page loads
      loadFixes();
      if (window.lucide) {
        lucide.createIcons();
      }
    </script>
  </body>
</html>
